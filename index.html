<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>都市飞翼</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Arial', sans-serif;
  }
  canvas {
    border: 2px solid #333;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 画布尺寸
const WIDTH = 480;
const HEIGHT = 640;
canvas.width = WIDTH;
canvas.height = HEIGHT;

// 让画布可聚焦,确保键盘事件可靠触发(尤其是空格键)
canvas.tabIndex = 0;
canvas.style.outline = 'none';

// ==================== 游戏常量 ====================
const GRAVITY = 0.45;
const FLAP_POWER = -7.5;
const MAX_FALL_SPEED = 10;
const MAX_RISE_SPEED = -8;
const BUILDING_WIDTH = 70;
const GAP_HEIGHT_BASE = 195;
const GAP_HEIGHT_MIN = 155;
const BUILDING_SPACING = 310;
const GROUND_HEIGHT = 60;
const PLANE_SIZE = 28;
const CLOUD_COUNT = 8;
const DISTANT_BUILDING_COUNT = 15;

// 难度配置
const DIFFICULTY_CONFIG = {
  easy: { gapHeight: 220, buildingSpeed: 2 },
  normal: { gapHeight: 195, buildingSpeed: 2.5 },
  hard: { gapHeight: 165, buildingSpeed: 3 }
};

// ==================== 数据模型 ====================
// 用户信息
let userProfile = JSON.parse(localStorage.getItem('flappyCity_userProfile')) || {
  name: '飞行员',
  avatarIndex: 0,
  totalGames: 0,
  totalScore: 0,
  bestScore: 0
};

// 游戏设置
let gameSettings = JSON.parse(localStorage.getItem('flappyCity_gameSettings')) || {
  soundEnabled: true,
  musicEnabled: true,
  difficulty: 'normal',
  vibration: true
};

// 游戏记录
let gameHistory = JSON.parse(localStorage.getItem('flappyCity_gameHistory')) || [];

// 当前最高分(网页版不持久化,避免跨人残留)
localStorage.removeItem('flappyCity_highScore');
if (typeof userProfile.bestScore === 'number' && userProfile.bestScore !== 0) {
  userProfile.bestScore = 0;
  localStorage.setItem('flappyCity_userProfile', JSON.stringify(userProfile));
}
let highScore = 0;

// UI状态
let uiState = 'start'; // start, settings, profile, history, gameOver
let selectedButton = null;
let hoveredButton = null;
let inputText = userProfile.name;
let showInput = false;

// ==================== 按钮定义 ====================
const buttons = {
  start: [
    { id: 'startGame', text: '开始游戏', x: WIDTH/2, y: HEIGHT/2 + 30, w: 200, h: 50 },
    { id: 'myRecords', text: '我的记录', x: WIDTH/2, y: HEIGHT/2 + 100, w: 160, h: 45 },
    { id: 'settings', text: '设置', x: WIDTH/2, y: HEIGHT/2 + 160, w: 160, h: 45 },
    { id: 'profile', text: '个人资料', x: WIDTH/2, y: HEIGHT/2 + 220, w: 160, h: 45 }
  ],
  settings: [
    { id: 'back', text: '← 返回', x: 60, y: 60, w: 100, h: 40 },
    { id: 'soundToggle', text: '音效', x: WIDTH/2, y: 160, w: 120, h: 45, type: 'toggle' },
    { id: 'musicToggle', text: '音乐', x: WIDTH/2, y: 230, w: 120, h: 45, type: 'toggle' },
    { id: 'difficultyEasy', text: '简单', x: WIDTH/2 - 140, y: 310, w: 110, h: 45 },
    { id: 'difficultyNormal', text: '普通', x: WIDTH/2, y: 310, w: 110, h: 45 },
    { id: 'difficultyHard', text: '困难', x: WIDTH/2 + 140, y: 310, w: 110, h: 45 }
  ],
  profile: [
    { id: 'back', text: '← 返回', x: 60, y: 60, w: 100, h: 40 },
    { id: 'avatar0', text: '🛩', x: 120, y: 150, w: 50, h: 50, type: 'avatar', index: 0 },
    { id: 'avatar1', text: '✈', x: 190, y: 150, w: 50, h: 50, type: 'avatar', index: 1 },
    { id: 'avatar2', text: '🚀', x: 260, y: 150, w: 50, h: 50, type: 'avatar', index: 2 },
    { id: 'avatar3', text: '🛫', x: 330, y: 150, w: 50, h: 50, type: 'avatar', index: 3 },
    { id: 'saveName', text: '保存', x: WIDTH/2, y: 250, w: 100, h: 40 },
    { id: 'resetData', text: '重置数据', x: WIDTH/2, y: 350, w: 160, h: 45 }
  ],
  history: [
    { id: 'back', text: '← 返回', x: 60, y: 60, w: 100, h: 40 }
  ],
  gameOver: [
    { id: 'restart', text: '再来一次', x: WIDTH/2, y: HEIGHT/2 + 30, w: 180, h: 50 },
    { id: 'home', text: '返回首页', x: WIDTH/2, y: HEIGHT/2 + 100, w: 180, h: 45 }
  ]
};

// ==================== 游戏状态 ====================
let gameState = 'start'; // start, playing, gameover
let score = 0;
let frameCount = 0;
let buildingSpeed = 2.5;
let gapHeight = GAP_HEIGHT_BASE;

// ==================== 飞机 ====================
let plane = {
  x: 100,
  y: HEIGHT / 2 - 50,
  width: PLANE_SIZE * 2,
  height: PLANE_SIZE,
  velocity: 0,
  rotation: 0
};

// ==================== 大楼障碍 ====================
let buildings = [];

// ==================== 云朵 ====================
let clouds = [];
for (let i = 0; i < CLOUD_COUNT; i++) {
  clouds.push({
    x: Math.random() * WIDTH,
    y: Math.random() * (HEIGHT - GROUND_HEIGHT - 150),
    width: 60 + Math.random() * 80,
    height: 25 + Math.random() * 20,
    speed: 0.3 + Math.random() * 0.5
  });
}

// ==================== 远景大厦 ====================
let distantBuildings = [];
for (let i = 0; i < DISTANT_BUILDING_COUNT; i++) {
  distantBuildings.push({
    x: i * (WIDTH / DISTANT_BUILDING_COUNT) + Math.random() * 30,
    width: 30 + Math.random() * 40,
    height: 80 + Math.random() * 200,
    windows: Math.random() > 0.3,
    antenna: Math.random() > 0.6
  });
}

// ==================== 粒子效果 ====================
let particles = [];
let trailParticles = [];

// ==================== 存储函数 ====================
function saveUserProfile() {
  localStorage.setItem('flappyCity_userProfile', JSON.stringify(userProfile));
}

function saveGameSettings() {
  localStorage.setItem('flappyCity_gameSettings', JSON.stringify(gameSettings));
}

function saveGameHistory() {
  localStorage.setItem('flappyCity_gameHistory', JSON.stringify(gameHistory));
}

function addHistoryRecord(score) {
  const record = {
    score: score,
    date: new Date().toLocaleDateString('zh-CN'),
    difficulty: gameSettings.difficulty
  };
  gameHistory.unshift(record);
  if (gameHistory.length > 10) gameHistory.pop();
  saveGameHistory();
}

// ==================== 初始化大楼 ====================
function initBuildings() {
  const config = DIFFICULTY_CONFIG[gameSettings.difficulty] || DIFFICULTY_CONFIG.normal;
  buildings = [];
  buildingSpeed = config.buildingSpeed;
  gapHeight = config.gapHeight;
  for (let x = WIDTH; x < WIDTH * 2; x += BUILDING_SPACING) {
    addBuilding(x);
  }
}

function addBuilding(xPos) {
  const minTop = 80;
  const maxTop = HEIGHT - GROUND_HEIGHT - GAP_HEIGHT_MIN - 80;
  const topHeight = minTop + Math.random() * (maxTop - minTop);
  buildings.push({
    x: xPos,
    topHeight: topHeight,
    passed: false
  });
}

// ==================== 重置游戏 ====================
function resetGame() {
  plane.y = HEIGHT / 2 - 50;
  plane.velocity = 0;
  plane.rotation = 0;
  score = 0;
  frameCount = 0;
  particles = [];
  trailParticles = [];
  initBuildings();
}

// ==================== 绘制函数 ====================
function drawSky() {
  const gradient = ctx.createLinearGradient(0, 0, 0, HEIGHT - GROUND_HEIGHT);
  gradient.addColorStop(0, '#87CEEB');
  gradient.addColorStop(0.5, '#B0E0E6');
  gradient.addColorStop(1, '#E0F0FF');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, WIDTH, HEIGHT - GROUND_HEIGHT);

  ctx.beginPath();
  ctx.arc(WIDTH - 80, 80, 50, 0, Math.PI * 2);
  const sunGrad = ctx.createRadialGradient(WIDTH - 80, 80, 10, WIDTH - 80, 80, 60);
  sunGrad.addColorStop(0, 'rgba(255, 255, 200, 0.8)');
  sunGrad.addColorStop(0.5, 'rgba(255, 255, 200, 0.3)');
  sunGrad.addColorStop(1, 'rgba(255, 255, 200, 0)');
  ctx.fillStyle = sunGrad;
  ctx.fill();
}

function drawClouds() {
  ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
  clouds.forEach(cloud => {
    ctx.beginPath();
    ctx.ellipse(cloud.x, cloud.y, cloud.width / 2, cloud.height / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cloud.x + cloud.width * 0.35, cloud.y - cloud.height * 0.2, cloud.width / 3, cloud.height / 2.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cloud.x - cloud.width * 0.35, cloud.y - cloud.height * 0.15, cloud.width / 3.5, cloud.height / 2.8, 0, 0, Math.PI * 2);
    ctx.fill();
  });
}

function updateClouds() {
  clouds.forEach(cloud => {
    cloud.x -= cloud.speed;
    if (cloud.x + cloud.width < 0) {
      cloud.x = WIDTH + cloud.width;
      cloud.y = Math.random() * (HEIGHT - GROUND_HEIGHT - 150);
    }
  });
}

function drawDistantBuildings() {
  distantBuildings.forEach(building => {
    const gradient = ctx.createLinearGradient(building.x, HEIGHT - GROUND_HEIGHT, building.x, HEIGHT - GROUND_HEIGHT - building.height);
    gradient.addColorStop(0, '#9DBCD4');
    gradient.addColorStop(1, '#B8D4E8');
    ctx.fillStyle = gradient;
    ctx.fillRect(building.x, HEIGHT - GROUND_HEIGHT - building.height, building.width, building.height);

    if (building.windows) {
      ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
      const rows = Math.floor(building.height / 15);
      const cols = Math.floor(building.width / 12);
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          ctx.fillRect(
            building.x + c * 12 + 3,
            HEIGHT - GROUND_HEIGHT - building.height + r * 15 + 3,
            6,
            8
          );
        }
      }
    }

    if (building.antenna) {
      ctx.strokeStyle = '#8AACC8';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(building.x + building.width / 2, HEIGHT - GROUND_HEIGHT - building.height);
      ctx.lineTo(building.x + building.width / 2, HEIGHT - GROUND_HEIGHT - building.height - 20);
      ctx.stroke();
      ctx.fillStyle = '#FF6B6B';
      ctx.beginPath();
      ctx.arc(building.x + building.width / 2, HEIGHT - GROUND_HEIGHT - building.height - 20, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  });
}

function drawGround() {
  const gradient = ctx.createLinearGradient(0, HEIGHT - GROUND_HEIGHT, 0, HEIGHT);
  gradient.addColorStop(0, '#5A5A5A');
  gradient.addColorStop(0.3, '#4A4A4A');
  gradient.addColorStop(1, '#3A3A3A');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, HEIGHT - GROUND_HEIGHT, WIDTH, GROUND_HEIGHT);

  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 3;
  ctx.setLineDash([15, 10]);
  ctx.beginPath();
  ctx.moveTo(0, HEIGHT - GROUND_HEIGHT + 15);
  ctx.lineTo(WIDTH, HEIGHT - GROUND_HEIGHT + 15);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#3A3A3A';
  for (let i = 0; i < WIDTH; i += 40) {
    ctx.fillRect(i, HEIGHT - 15, 30, 5);
  }
}

function drawPlane() {
  ctx.save();
  ctx.translate(plane.x + plane.width / 2, plane.y + plane.height / 2);
  ctx.rotate(plane.rotation);

  const gradient = ctx.createLinearGradient(-plane.width / 2, 0, plane.width / 2, 0);
  gradient.addColorStop(0, '#FF6B6B');
  gradient.addColorStop(0.5, '#FF8E8E');
  gradient.addColorStop(1, '#FFB5B5');
  ctx.fillStyle = gradient;

  ctx.beginPath();
  ctx.moveTo(-plane.width / 2, 0);
  ctx.lineTo(plane.width / 2, 0);
  ctx.lineTo(plane.width / 2 - 5, -plane.height / 2);
  ctx.lineTo(-plane.width / 2 + 5, -plane.height / 2);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#D63031';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = '#4ECDC4';
  ctx.beginPath();
  ctx.ellipse(0, -2, 12, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.moveTo(-plane.width / 2 + 8, plane.height / 2);
  ctx.lineTo(-plane.width / 2 + 8, plane.height / 2 + 8);
  ctx.lineTo(-plane.width / 2 + 3, plane.height / 2);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(plane.width / 2 - 8, plane.height / 2);
  ctx.lineTo(plane.width / 2 - 8, plane.height / 2 + 8);
  ctx.lineTo(plane.width / 2 - 3, plane.height / 2);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawBuildings() {
  buildings.forEach(building => {
    const gradient = ctx.createLinearGradient(building.x, 0, building.x + BUILDING_WIDTH, 0);
    gradient.addColorStop(0, '#4A90E2');
    gradient.addColorStop(0.5, '#5BA3F5');
    gradient.addColorStop(1, '#6BB6FF');
    ctx.fillStyle = gradient;
    ctx.fillRect(building.x, 0, BUILDING_WIDTH, building.topHeight);
    ctx.fillRect(building.x, building.topHeight + gapHeight, BUILDING_WIDTH, HEIGHT - GROUND_HEIGHT - building.topHeight - gapHeight);

    ctx.strokeStyle = '#2E5C8A';
    ctx.lineWidth = 3;
    ctx.strokeRect(building.x, 0, BUILDING_WIDTH, building.topHeight);
    ctx.strokeRect(building.x, building.topHeight + gapHeight, BUILDING_WIDTH, HEIGHT - GROUND_HEIGHT - building.topHeight - gapHeight);

    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
    const topRows = Math.floor(building.topHeight / 25);
    for (let r = 0; r < topRows; r++) {
      for (let c = 0; c < 3; c++) {
        ctx.fillRect(building.x + c * 20 + 8, r * 25 + 8, 12, 15);
      }
    }
    const bottomStart = building.topHeight + gapHeight;
    const bottomRows = Math.floor((HEIGHT - GROUND_HEIGHT - bottomStart) / 25);
    for (let r = 0; r < bottomRows; r++) {
      for (let c = 0; c < 3; c++) {
        ctx.fillRect(building.x + c * 20 + 8, bottomStart + r * 25 + 8, 12, 15);
      }
    }

    ctx.fillStyle = '#FF6B6B';
    ctx.fillRect(building.x, building.topHeight - 5, BUILDING_WIDTH, 5);
    ctx.fillRect(building.x, building.topHeight + gapHeight, BUILDING_WIDTH, 5);
  });
}

function updatePlane() {
  plane.velocity += GRAVITY;
  plane.velocity = Math.max(MAX_RISE_SPEED, Math.min(plane.velocity, MAX_FALL_SPEED));
  plane.y += plane.velocity;

  plane.rotation = Math.min(Math.max(plane.velocity * 0.05, -0.5), 0.8);

  if (frameCount % 3 === 0) {
    trailParticles.push({
      x: plane.x,
      y: plane.y + plane.height / 2,
      size: 4 + Math.random() * 3,
      alpha: 0.6,
      vx: -2 - Math.random(),
      vy: (Math.random() - 0.5) * 2
    });
  }
}

function updateBuildings() {
  buildings.forEach(building => {
    building.x -= buildingSpeed;
    if (!building.passed && building.x + BUILDING_WIDTH < plane.x) {
      building.passed = true;
      score++;
    }
  });

  if (buildings.length > 0 && buildings[0].x + BUILDING_WIDTH < 0) {
    buildings.shift();
  }

  if (buildings.length > 0 && buildings[buildings.length - 1].x < WIDTH - BUILDING_SPACING) {
    addBuilding(buildings[buildings.length - 1].x + BUILDING_SPACING);
  }
}

function checkCollision() {
  if (plane.y + plane.height > HEIGHT - GROUND_HEIGHT || plane.y < 0) {
    return true;
  }

  for (let building of buildings) {
    if (plane.x + plane.width > building.x && plane.x < building.x + BUILDING_WIDTH) {
      if (plane.y < building.topHeight || plane.y + plane.height > building.topHeight + gapHeight) {
        return true;
      }
    }
  }

  return false;
}

function createExplosion(x, y) {
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x: x,
      y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: 3 + Math.random() * 4,
      color: ['#FF6B6B', '#FFD93D', '#FF8E8E', '#FFA07A'][Math.floor(Math.random() * 4)],
      life: 1.0
    });
  }
}

function updateParticles() {
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2;
    p.life -= 0.02;
  });
  particles = particles.filter(p => p.life > 0);
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });
}

function updateTrailParticles() {
  trailParticles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.alpha -= 0.02;
  });
  trailParticles = trailParticles.filter(p => p.alpha > 0);
}

function drawTrailParticles() {
  trailParticles.forEach(p => {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = '#FFD93D';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });
}

// ==================== UI绘制 ====================
function drawButton(btn, isHovered, isSelected) {
  ctx.save();
  
  let fillColor = '#4ECDC4';
  if (isSelected) fillColor = '#FFD93D';
  else if (isHovered) fillColor = '#5FE0D7';

  const gradient = ctx.createLinearGradient(btn.x - btn.w/2, btn.y - btn.h/2, btn.x - btn.w/2, btn.y + btn.h/2);
  gradient.addColorStop(0, fillColor);
  gradient.addColorStop(1, isSelected ? '#FFC700' : (isHovered ? '#4ECDC4' : '#3EADA3'));
  ctx.fillStyle = gradient;

  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.shadowBlur = isHovered ? 15 : 8;
  ctx.shadowOffsetY = isHovered ? 6 : 4;

  const radius = 10;
  ctx.beginPath();
  ctx.moveTo(btn.x - btn.w/2 + radius, btn.y - btn.h/2);
  ctx.lineTo(btn.x + btn.w/2 - radius, btn.y - btn.h/2);
  ctx.quadraticCurveTo(btn.x + btn.w/2, btn.y - btn.h/2, btn.x + btn.w/2, btn.y - btn.h/2 + radius);
  ctx.lineTo(btn.x + btn.w/2, btn.y + btn.h/2 - radius);
  ctx.quadraticCurveTo(btn.x + btn.w/2, btn.y + btn.h/2, btn.x + btn.w/2 - radius, btn.y + btn.h/2);
  ctx.lineTo(btn.x - btn.w/2 + radius, btn.y + btn.h/2);
  ctx.quadraticCurveTo(btn.x - btn.w/2, btn.y + btn.h/2, btn.x - btn.w/2, btn.y + btn.h/2 - radius);
  ctx.lineTo(btn.x - btn.w/2, btn.y - btn.h/2 + radius);
  ctx.quadraticCurveTo(btn.x - btn.w/2, btn.y - btn.h/2, btn.x - btn.w/2 + radius, btn.y - btn.h/2);
  ctx.closePath();
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;

  ctx.strokeStyle = '#2C8C84';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 18px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(btn.text, btn.x, btn.y);

  ctx.restore();
}

function drawStartScreen() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  ctx.save();
  ctx.font = 'bold 56px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFD93D';
  ctx.strokeStyle = '#2C3E50';
  ctx.lineWidth = 6;
  ctx.strokeText('都市飞翼', WIDTH / 2, HEIGHT / 2 - 120);
  ctx.fillText('都市飞翼', WIDTH / 2, HEIGHT / 2 - 120);
  ctx.restore();

  ctx.save();
  ctx.font = '18px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText('点击屏幕或按空格键操作飞机', WIDTH / 2, HEIGHT / 2 - 50);
  ctx.restore();

  buttons.start.forEach(btn => {
    const isHovered = hoveredButton === btn.id;
    drawButton(btn, isHovered, false);
  });

  ctx.save();
  ctx.font = '14px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
  ctx.fillText(`当前难度: ${gameSettings.difficulty === 'easy' ? '简单' : gameSettings.difficulty === 'hard' ? '困难' : '普通'}`, WIDTH / 2, HEIGHT - 20);
  ctx.restore();
}

function drawGameOverScreen() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  ctx.save();
  ctx.font = 'bold 48px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FF6B6B';
  ctx.strokeStyle = '#2C3E50';
  ctx.lineWidth = 5;
  ctx.strokeText('游戏结束', WIDTH / 2, HEIGHT / 2 - 150);
  ctx.fillText('游戏结束', WIDTH / 2, HEIGHT / 2 - 150);
  ctx.restore();

  ctx.save();
  ctx.font = 'bold 32px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText('得分: ' + score, WIDTH / 2, HEIGHT / 2 - 80);
  ctx.restore();

  ctx.save();
  ctx.font = '24px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFD93D';
  ctx.fillText('本局最高: ' + highScore, WIDTH / 2, HEIGHT / 2 - 30);
  ctx.restore();

  buttons.gameOver.forEach(btn => {
    const isHovered = hoveredButton === btn.id;
    drawButton(btn, isHovered, false);
  });
}

function drawSettingsScreen() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  ctx.save();
  ctx.font = 'bold 36px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFD93D';
  ctx.fillText('设置', WIDTH / 2, 110);
  ctx.restore();

  buttons.settings.forEach(btn => {
    const isHovered = hoveredButton === btn.id;
    let isSelected = false;

    if (btn.type === 'toggle') {
      if (btn.id === 'soundToggle') isSelected = gameSettings.soundEnabled;
      if (btn.id === 'musicToggle') isSelected = gameSettings.musicEnabled;
    } else if (btn.id === 'difficultyEasy') {
      isSelected = gameSettings.difficulty === 'easy';
    } else if (btn.id === 'difficultyNormal') {
      isSelected = gameSettings.difficulty === 'normal';
    } else if (btn.id === 'difficultyHard') {
      isSelected = gameSettings.difficulty === 'hard';
    }

    drawButton(btn, isHovered, isSelected);
  });

  ctx.save();
  ctx.font = '20px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText('难度选择', WIDTH / 2, 280);
  ctx.restore();
}

function drawProfileScreen() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  ctx.save();
  ctx.font = 'bold 36px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFD93D';
  ctx.fillText('个人资料', WIDTH / 2, 110);
  ctx.restore();

  buttons.profile.forEach(btn => {
    const isHovered = hoveredButton === btn.id;
    let isSelected = false;
    if (btn.type === 'avatar') {
      isSelected = userProfile.avatarIndex === btn.index;
    }
    drawButton(btn, isHovered, isSelected);
  });

  ctx.save();
  ctx.font = '20px Arial';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#FFFFFF';
  ctx.fillText('昵称:', 60, 220);
  ctx.restore();

  const inputBoxX = 150;
  const inputBoxY = 200;
  const inputBoxW = 250;
  const inputBoxH = 40;

  ctx.fillStyle = showInput ? '#FFFFFF' : 'rgba(255,255,255,0.3)';
  ctx.fillRect(inputBoxX, inputBoxY, inputBoxW, inputBoxH);
  ctx.strokeStyle = showInput ? '#4ECDC4' : '#888888';
  ctx.lineWidth = 2;
  ctx.strokeRect(inputBoxX, inputBoxY, inputBoxW, inputBoxH);

  ctx.fillStyle = '#000000';
  ctx.font = '18px Arial';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  const displayText = showInput ? inputText + '|' : (inputText || userProfile.name);
  ctx.fillText(displayText, inputBoxX + 10, inputBoxY + inputBoxH / 2);

  ctx.save();
  ctx.font = '18px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#AAAAAA';
  ctx.fillText('总游戏次数: ' + userProfile.totalGames, WIDTH / 2, 420);
  ctx.fillText('总得分: ' + userProfile.totalScore, WIDTH / 2, 450);
  ctx.restore();
}

function drawHistoryScreen() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  ctx.save();
  ctx.font = 'bold 36px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#FFD93D';
  ctx.fillText('游戏记录', WIDTH / 2, 110);
  ctx.restore();

  buttons.history.forEach(btn => {
    const isHovered = hoveredButton === btn.id;
    drawButton(btn, isHovered, false);
  });

  ctx.save();
  ctx.font = '18px Arial';
  ctx.textAlign = 'left';
  ctx.fillStyle = '#FFFFFF';

  if (gameHistory.length === 0) {
    ctx.textAlign = 'center';
    ctx.fillText('暂无游戏记录', WIDTH / 2, HEIGHT / 2);
  } else {
    const startY = 160;
    const lineHeight = 35;
    gameHistory.slice(0, 10).forEach((record, index) => {
      const y = startY + index * lineHeight;
      const diffText = record.difficulty === 'easy' ? '简单' : record.difficulty === 'hard' ? '困难' : '普通';
      ctx.fillText(`${index + 1}. ${record.date}  得分: ${record.score}  难度: ${diffText}`, 60, y);
    });
  }
  ctx.restore();
}

// ==================== 按钮交互 ====================
function isPointInButton(x, y, btn) {
  return x >= btn.x - btn.w/2 && x <= btn.x + btn.w/2 &&
         y >= btn.y - btn.h/2 && y <= btn.y + btn.h/2;
}

function handleButtonClick(x, y) {
  let currentButtons = [];
  
  // 根据当前UI状态获取对应的按钮列表
  switch (uiState) {
    case 'start': currentButtons = buttons.start; break;
    case 'settings': currentButtons = buttons.settings; break;
    case 'profile': currentButtons = buttons.profile; break;
    case 'history': currentButtons = buttons.history; break;
    case 'gameOver': currentButtons = buttons.gameOver; break;
  }

  // 检查点击了哪个按钮
  for (let btn of currentButtons) {
    if (isPointInButton(x, y, btn)) {
      handleButtonAction(btn.id);
      return true;
    }
  }

  // 处理个人资料界面的输入框点击
  if (uiState === 'profile') {
    const inputBoxX = 150;
    const inputBoxY = 200;
    const inputBoxW = 250;
    const inputBoxH = 40;
    if (x >= inputBoxX && x <= inputBoxX + inputBoxW && y >= inputBoxY && y <= inputBoxY + inputBoxH) {
      showInput = true;
      inputText = userProfile.name;
      return true;
    } else {
      showInput = false;
    }
  }

  return false;
}

function handleButtonAction(btnId) {
  console.log('Button clicked:', btnId);
  
  switch (btnId) {
    case 'startGame':
      gameState = 'playing';
      uiState = 'playing';
      resetGame();
      break;
      
    case 'myRecords':
      uiState = 'history';
      break;
      
    case 'settings':
      uiState = 'settings';
      break;
      
    case 'profile':
      uiState = 'profile';
      break;
      
    case 'back':
      uiState = 'start';
      gameState = 'start';
      break;
      
    case 'soundToggle':
      gameSettings.soundEnabled = !gameSettings.soundEnabled;
      saveGameSettings();
      break;
      
    case 'musicToggle':
      gameSettings.musicEnabled = !gameSettings.musicEnabled;
      saveGameSettings();
      break;
      
    case 'difficultyEasy':
      gameSettings.difficulty = 'easy';
      saveGameSettings();
      break;
      
    case 'difficultyNormal':
      gameSettings.difficulty = 'normal';
      saveGameSettings();
      break;
      
    case 'difficultyHard':
      gameSettings.difficulty = 'hard';
      saveGameSettings();
      break;
      
    case 'saveName':
      if (inputText.trim()) {
        userProfile.name = inputText.trim();
        saveUserProfile();
        showInput = false;
      }
      break;
      
    case 'resetData':
      if (confirm('确定要重置所有数据吗?')) {
        userProfile = {
          name: '飞行员',
          avatarIndex: 0,
          totalGames: 0,
          totalScore: 0,
          bestScore: 0
        };
        gameHistory = [];
        saveUserProfile();
        saveGameHistory();
        inputText = userProfile.name;
      }
      break;
      
    case 'restart':
      gameState = 'playing';
      uiState = 'playing';
      resetGame();
      break;
      
    case 'home':
      gameState = 'start';
      uiState = 'start';
      resetGame();
      break;
      
    default:
      // 处理头像选择
      if (btnId.startsWith('avatar')) {
        const index = parseInt(btnId.replace('avatar', ''));
        userProfile.avatarIndex = index;
        saveUserProfile();
      }
      break;
  }
}

function handleStartScreenClick(x, y) {
  // 这个函数现在由handleButtonClick统一处理
}

// ==================== 飞行操作 ====================
function flap() {
  if (gameState === 'playing') {
    plane.velocity = FLAP_POWER;
  } else if (gameState === 'start') {
    // 在开始界面按空格也可以开始游戏
    gameState = 'playing';
    uiState = 'playing';
    resetGame();
  }
}

function isFlapKey(e) {
  return e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Enter';
}

function handleNameInputKeydown(e) {
  if (!showInput) return false;

  // 编辑用户名时,阻止游戏按键
  if (e.code === 'Enter') {
    e.preventDefault();
    if (inputText.trim()) {
      userProfile.name = inputText.trim();
      saveUserProfile();
    }
    showInput = false;
    return true;
  }

  if (e.code === 'Escape') {
    e.preventDefault();
    showInput = false;
    inputText = userProfile.name;
    return true;
  }

  if (e.code === 'Backspace') {
    e.preventDefault();
    inputText = inputText.slice(0, -1);
    return true;
  }

  // 可输入字符
  if (e.key && e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
    inputText += e.key;
    return true;
  }

  return true;
}

function handleGameKeydown(e) {
  if (handleNameInputKeydown(e)) return;

  if (isFlapKey(e)) {
    e.preventDefault(); // 阻止空格滚动页面等默认行为
    flap();
  }
}

window.addEventListener('keydown', handleGameKeydown, { capture: true });

// 页面加载/点击时主动聚焦画布,提升空格键触发稳定性
window.addEventListener('load', () => canvas.focus());
canvas.addEventListener('pointerdown', () => canvas.focus());

// ==================== 触摸/点击支持 ====================
let lastTapTime = 0;
let isProcessingClick = false;

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = WIDTH / rect.width;
  const scaleY = HEIGHT / rect.height;
  let clientX, clientY;
  if (e.touches) {
    clientX = e.touches[0].clientX;
    clientY = e.touches[0].clientY;
  } else {
    clientX = e.clientX;
    clientY = e.clientY;
  }
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top) * scaleY
  };
}

function handleCanvasClick(x, y) {
  // 防止重复处理
  const now = Date.now();
  if (now - lastTapTime < 100 || isProcessingClick) return;
  lastTapTime = now;
  isProcessingClick = true;

  // 游戏进行中,只做飞行操作
  if (gameState === 'playing') {
    plane.velocity = FLAP_POWER;
    setTimeout(() => { isProcessingClick = false; }, 50);
    return;
  }

  // 处理按钮点击
  handleButtonClick(x, y);

  setTimeout(() => { isProcessingClick = false; }, 50);
}

canvas.addEventListener('mousedown', (e) => {
  e.preventDefault();
  const pos = getPos(e);
  handleCanvasClick(pos.x, pos.y);
});

canvas.addEventListener('mousemove', (e) => {
  const pos = getPos(e);
  hoveredButton = null;

  let currentButtons = [];
  switch (uiState) {
    case 'start': currentButtons = buttons.start; break;
    case 'settings': currentButtons = buttons.settings; break;
    case 'profile': currentButtons = buttons.profile; break;
    case 'history': currentButtons = buttons.history; break;
    case 'gameOver': currentButtons = buttons.gameOver; break;
  }

  for (let btn of currentButtons) {
    if (isPointInButton(pos.x, pos.y, btn)) {
      hoveredButton = btn.id;
      break;
    }
  }
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const pos = getPos(e);
  handleCanvasClick(pos.x, pos.y);
}, {passive: false});

// ==================== 主游戏循环 ====================
function gameLoop() {
  frameCount++;

  drawSky();
  updateClouds();
  drawClouds();
  drawDistantBuildings();
  drawGround();

  if (gameState === 'playing') {
    updatePlane();
    updateBuildings();
    updateTrailParticles();

    if (checkCollision()) {
      gameState = 'gameover';
      uiState = 'gameOver';
      createExplosion(plane.x + plane.width / 2, plane.y + plane.height / 2);

      // 更新统计数据
      if (score > highScore) {
        highScore = score;
      }
      userProfile.totalGames++;
      userProfile.totalScore += score;
      saveUserProfile();
      addHistoryRecord(score);
    }
  }

  drawBuildings();
  drawTrailParticles();

  if (gameState === 'playing' || gameState === 'start') {
    if (gameState === 'start') {
      plane.y = HEIGHT / 2 - 50 + Math.sin(frameCount * 0.05) * 15;
      plane.rotation = Math.sin(frameCount * 0.05) * 0.1;
    }
    drawPlane();
  }

  updateParticles();
  drawParticles();

  // 绘制分数(游戏中)
  if (gameState === 'playing') {
    ctx.save();
    ctx.font = 'bold 42px Arial';
    ctx.textAlign = 'center';
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 4;
    ctx.fillStyle = '#FFFFFF';
    ctx.strokeText('楼层:' + score, WIDTH / 2, 60);
    ctx.fillText('楼层:' + score, WIDTH / 2, 60);
    ctx.restore();
  }

  // 绘制UI界面
  if (uiState === 'start') {
    drawStartScreen();
  } else if (uiState === 'gameOver') {
    drawGameOverScreen();
  } else if (uiState === 'settings') {
    drawSettingsScreen();
  } else if (uiState === 'profile') {
    drawProfileScreen();
  } else if (uiState === 'history') {
    drawHistoryScreen();
  }

  requestAnimationFrame(gameLoop);
}

// ==================== 启动游戏 ====================
initBuildings();
gameLoop();
</script>
